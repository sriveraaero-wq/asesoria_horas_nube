services:
  - type: web
    name: asesoria-horas
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: SECRET_KEY
        generateValue: true
      - key: ADMIN_USER
        value: admin
      - key: ADMIN_PASSWORD
        value: admin123
      - key: ADMIN_NAME
        value: Administrador del Equipo
      - key: CREATE_DEMO_DATA
        value: true
      - key: DATABASE_URL
        fromDatabase:
          name: asesoria-horas-db
          property: connectionString

databases:
  - name: asesoria-horas-db
    plan: free
