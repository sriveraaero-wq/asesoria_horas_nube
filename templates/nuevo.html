{% extends "base.html" %}
{% block content %}
<section class="form-card">
  <div class="section-title"><div><h2>Registro de Horas</h2><p>Los registros quedarán asociados al usuario que inició sesión.</p></div></div>
  <form method="post" class="form-grid">
    <div><label>Fecha del registro</label><input type="date" name="fecha" value="{{ form.fecha or today }}" required></div>
    <div><label>Cliente / Empresa</label><input name="empresa" value="{{ form.empresa or '' }}" placeholder="Ej.: AAP" required></div>
    <div><label>Proyecto</label><input name="proyecto" value="{{ form.proyecto or '' }}" placeholder="Ej.: Arequipa RWY" required></div>
    <div><label>Horas dedicadas</label><input type="number" step="0.1" min="0" name="horas" value="{{ form.horas or '' }}" placeholder="Ej.: 2.5" required></div>
    <div><label>Estado de la tarea</label><select name="estado" required>{% for estado in ["En proceso","Completado","Pendiente","En revisión","Suspendido"] %}<option {{ "selected" if form.estado == estado else "" }}>{{ estado }}</option>{% endfor %}</select></div>
    <div><label>Consultor responsable</label><input name="consultor" value="{{ form.consultor or g.user.full_name }}" required></div>
    <div class="span-2"><label>Descripción de la asesoría</label><textarea name="descripcion" required placeholder="Describa brevemente el trabajo realizado">{{ form.descripcion or '' }}</textarea></div>
    <div class="span-2"><label>Observaciones</label><textarea name="observaciones" placeholder="Acuerdos, pendientes o comentarios">{{ form.observaciones or '' }}</textarea></div>
    <div class="form-actions span-2"><button class="primary-btn" type="submit">Submit</button><a class="ghost-btn" href="{{ url_for('panel') }}">Regresar al panel</a></div>
  </form>
</section>
{% endblock %}
