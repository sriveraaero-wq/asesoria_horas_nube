{% extends "base.html" %}
{% block title %}Inicio · Asesoría Horas{% endblock %}
{% block content %}
<section class="landing-page">
  <section class="landing-hero-pro">
    <div class="landing-hero-shade">
      <div class="landing-copy-pro">
        <p class="landing-kicker">Gestión simple de asesorías</p>
        <h1>Registra horas de asesoría</h1>
        <p>Controla tiempo invertido, tareas atendidas y observaciones en un solo lugar.</p>
        <a class="primary-btn landing-btn" href="{{ url_for('panel') if g.user and g.user.role == 'admin' else (url_for('nuevo') if g.user else url_for('login')) }}">Comenzar</a>
      </div>
    </div>
  </section>
</section>
{% endblock %}
